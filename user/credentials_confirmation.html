<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Credentials Generated | Catalyst Inventory</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#00343c",
                        "on-error": "#ffefee",
                        "background": "#f5f6f7",
                        "on-tertiary-fixed-variant": "#005360",
                        "on-tertiary": "#dcf7ff",
                        "surface-variant": "#dadddf",
                        "secondary": "#006853",
                        "surface-container": "#e6e8ea",
                        "on-primary-fixed-variant": "#006544",
                        "tertiary-container": "#00dcfd",
                        "on-primary-fixed": "#00452d",
                        "outline-variant": "#abadae",
                        "on-surface-variant": "#595c5d",
                        "surface-dim": "#d1d5d7",
                        "surface-bright": "#f5f6f7",
                        "surface": "#f5f6f7",
                        "on-primary": "#c8ffe0",
                        "on-secondary-fixed-variant": "#006853",
                        "primary-fixed-dim": "#58e7ab",
                        "secondary-container": "#5afcd2",
                        "outline": "#757778",
                        "primary-container": "#69f6b8",
                        "on-secondary-container": "#005d4a",
                        "inverse-surface": "#0c0f10",
                        "secondary-fixed-dim": "#47edc4",
                        "on-secondary": "#c4ffea",
                        "on-background": "#2c2f30",
                        "tertiary-fixed": "#00dcfd",
                        "error-dim": "#9f0519",
                        "tertiary": "#006575",
                        "surface-container-highest": "#dadddf",
                        "surface-tint": "#006947",
                        "inverse-on-surface": "#9b9d9e",
                        "secondary-fixed": "#5afcd2",
                        "primary": "#006947",
                        "surface-container-high": "#e0e3e4",
                        "surface-container-low": "#eff1f2",
                        "on-surface": "#2c2f30",
                        "on-primary-container": "#005a3c",
                        "error-container": "#fb5151",
                        "on-error-container": "#570008",
                        "primary-dim": "#005c3d",
                        "primary-fixed": "#69f6b8",
                        "error": "#b31b25",
                        "tertiary-fixed-dim": "#00cdeb",
                        "secondary-dim": "#005b48",
                        "on-secondary-fixed": "#004939",
                        "on-tertiary-container": "#004955",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-dim": "#005866",
                        "inverse-primary": "#69f6b8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Work Sans"],
                        "display": ["Work Sans"],
                        "body": ["Work Sans"],
                        "label": ["Work Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #f5f6f7;
            color: #2c2f30;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .password-field-container {
            box-shadow: 0 12px 40px rgba(0, 105, 71, 0.08);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-surface">
    <div class="max-w-xl w-full">
        <!-- Success Indicator -->
        <div class="flex flex-col items-center mb-10">
            <div
                class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-6">
                <span class="material-symbols-outlined text-3xl"
                    style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <div class="text-center">
                <p class="text-primary font-bold uppercase tracking-widest text-[0.65rem] mb-2 font-label">Account
                    Provisioned</p>
                <h1 class="text-on-background text-4xl font-extrabold tracking-tight mb-3">Credentials Generated</h1>
                <p class="text-on-surface-variant text-base">The administrator account for <span
                        class="font-semibold text-on-background">Alex Rivers</span> has been successfully created within
                    the Catalyst ecosystem.</p>
            </div>
        </div>
        <!-- Credential Card -->
        <div
            class="bg-surface-container-lowest rounded-xl p-8 password-field-container border border-outline-variant/10 mb-8 relative overflow-hidden">
            <!-- Asymmetric accent -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16"></div>
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-on-surface-variant font-medium text-sm">Temporary Password</span>
                    <span
                        class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-secondary-container text-on-secondary-container text-xs font-bold">
                        <span class="material-symbols-outlined text-sm">enhanced_encryption</span>
                        ENCRYPTED
                    </span>
                </div>
                <div
                    class="flex items-center gap-3 bg-surface-container-low p-5 rounded-lg group transition-all border-b-2 border-primary">
                    <code
                        class="flex-1 font-mono text-xl md:text-2xl font-bold tracking-[0.2em] text-on-background">PONNO-9823-XQZ-KINETIC</code>
                    <button
                        class="p-2 text-primary hover:bg-primary-container rounded-lg transition-colors active:scale-90 duration-150"
                        title="Copy to clipboard">
                        <span class="material-symbols-outlined">content_copy</span>
                    </button>
                </div>
            </div>
        </div>
        <!-- Action Grid -->
        <div class="flex justify-center">
            <button
                class="flex items-center justify-center gap-2 bg-surface-container-high text-on-surface font-semibold py-4 px-8 rounded-lg hover:bg-surface-container-highest active:scale-[0.98] transition-all min-w-[280px]">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Back to User Management
            </button>
        </div>
        <!-- Footer Note -->
        <p
            class="text-center mt-10 text-on-surface-variant text-[0.7rem] uppercase tracking-widest font-medium opacity-60">
            System Identity Catalyst • Transaction ID: CT-9923481
        </p>
    </div>
</body>

</html>
